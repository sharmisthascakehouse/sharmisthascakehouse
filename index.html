<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharmistha's Cake House</title><style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#fff8f3;
}

header{
background:#ff6f61;
color:white;
padding:20px;
text-align:center;
}

header h1{
margin:0;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

.gallery{
display:flex;
overflow-x:auto;
gap:12px;
padding:10px;
scroll-snap-type:x mandatory;
}

.cakeimg{
width:220px;
height:220px;
object-fit:cover;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
scroll-snap-align:center;
cursor:pointer;
}

.selected{
text-align:center;
font-size:18px;
font-weight:bold;
color:#ff5722;
margin:15px 0;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
font-size:16px;
}

.price{
font-size:32px;
font-weight:bold;
text-align:center;
color:#ff5722;
margin-top:20px;
}

.btn{
display:block;
text-align:center;
padding:15px;
margin-top:15px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
color:white;
}

.whatsapp{
background:#25D366;
}

.call{
background:#28a745;
}

.note{
margin-top:20px;
padding:15px;
background:#fff3cd;
border-radius:10px;
text-align:center;
}

</style></head><body><header>
<h1>🎂 Sharmistha's Cake House</h1>
<p>Fresh Homemade Custom Cakes</p>
</header><div class="container"><h2>🎂 Cake Gallery</h2><div class="gallery"><img src="images/IMG-20260520-WA0065.jpg" class="cakeimg" onclick="selectDesign('Design 1')"><img src="images/IMG-20260612-WA0005.jpg" class="cakeimg" onclick="selectDesign('Design 2')"><img src="images/IMG-20260612-WA0004.jpg" class="cakeimg" onclick="selectDesign('Design 3')"><img src="images/IMG-20260610-WA0044.jpg" class="cakeimg" onclick="selectDesign('Design 4')"><img src="images/IMG-20260610-WA0043.jpg" class="cakeimg" onclick="selectDesign('Design 5')"><img src="images/IMG-20260615-WA0002.jpg" class="cakeimg" onclick="selectDesign('Design 6')"><img src="images/IMG-20260614-WA0123.jpg" class="cakeimg" onclick="selectDesign('Design 7')"><img src="images/IMG-20260603-WA0038.jpg" class="cakeimg" onclick="selectDesign('Design 8')"><img src="images/IMG-20260603-WA0037.jpg" class="cakeimg" onclick="selectDesign('Design 9')"><img src="images/IMG-20260603-WA0039.jpg" class="cakeimg" onclick="selectDesign('Design 10')"></div><div id="selectedDesign" class="selected">
No Design Selected
</div><div class="card"><h3>Select Flavour</h3><select id="flavour" onchange="updatePrice()"><option value="">Choose Flavour</option><option value="group1">Mango</option>
<option value="group1">Strawberry</option>
<option value="group1">Pineapple</option>
<option value="group1">Orange</option><option value="butter">Butterscotch</option><option value="choco">Chocolate</option><option value="overload">Chocolate Overloaded</option><option value="premium">Red Velvet</option>
<option value="premium">Rasmalai</option>
<option value="premium">Black Forest</option>
<option value="premium">White Forest</option></select><h3>Select Weight</h3><select id="weight" onchange="updatePrice()"><option value="">Choose Weight</option><option value="half">Half Pound</option>
<option value="one">1 Pound</option>
<option value="onehalf">1.5 Pound</option>
<option value="two">2 Pound</option></select><div class="price" id="price">₹0</div><a href="#" id="whatsappBtn" class="btn whatsapp">
💬 WhatsApp Order
</a><a href="tel:9123728105" class="btn call">
📞 Call Me
</a><div class="note">
<b>Don't like any design?</b><br>
Send your preferred design to WhatsApp.
</div></div></div>
  <script>

let selectedDesign = "Not Selected";

function selectDesign(design){

selectedDesign = design;

document.getElementById("selectedDesign").innerHTML =
"✅ " + design + " Selected";

updatePrice();

}

function updatePrice(){

let flavour =
document.getElementById("flavour").value;

let weight =
document.getElementById("weight").value;

let price = 0;

const prices = {

group1:{
half:260,
one:360,
onehalf:660,
two:860
},

butter:{
half:300,
one:400,
onehalf:760,
two:900
},

choco:{
half:320,
one:500,
onehalf:820,
two:1200
},

overload:{
half:350,
one:550,
onehalf:850,
two:1250
},

premium:{
half:400,
one:600,
onehalf:1220,
two:1650
}

};

if(flavour && weight){

price = prices[flavour][weight];

}

document.getElementById("price").innerHTML =
"₹" + price;

let flavourText =
document.getElementById("flavour")
.options[
document.getElementById("flavour").selectedIndex
].text;

let weightText =
document.getElementById("weight")
.options[
document.getElementById("weight").selectedIndex
].text;

let msg =
`Hello Sharmistha's Cake House,

Selected Design: ${selectedDesign}

Flavour: ${flavourText}

Weight: ${weightText}

Price: ₹${price}

Please confirm my order.`;

document.getElementById("whatsappBtn")
.href =
"https://wa.me/919123728105?text="
+ encodeURIComponent(msg);

}

</script></body>
</html>
